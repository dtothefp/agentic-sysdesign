# The environment: the sandbox spec every digest session runs in. ECS analogy,
# this is the cluster + network config, not the task. Created once at bootstrap
# (`agentctl.py bootstrap`), reused by every session across every tier; its id
# lives in resources.json. `cloud` means Anthropic hosts the container; the
# alternative (`self_hosted`) keeps the agent loop on Anthropic's side but runs
# bash/file tools in a container you operate, which is exactly the harness/
# deployment split Module 5 exists to study.
#
# Networking is unrestricted for now (the build guide's sketch). The tighter
# variant, worth trying once the first run works, is deny-by-default:
#   networking: {type: limited, allowed_hosts: [sysdesign.thedefrag.ai]}
name: sysdesign-sandbox
config:
  type: cloud
  networking:
    type: unrestricted
