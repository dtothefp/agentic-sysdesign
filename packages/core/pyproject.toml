[project]
name = "sysdesign-core"
version = "0.1.0"
description = "Shared domain layer: db pool/env loading, signal inserts, content hashing, rating adapter, seeds. Import name stays `common` so call sites didn't churn in the monorepo split. Also owns db/ (dbmate migrations + the prod migrate.py applier), which ships as files, not a module."
requires-python = ">=3.13"
dependencies = [
  "psycopg[binary]>=3.2",
  "psycopg-pool>=3.2",
  # Module 4: LangSmith tracing for the rating model call (standalone @traceable, no
  # LangChain). rating.py degrades to a passthrough when it's absent, but prod wants it.
  "langsmith>=0.10.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["common"]
