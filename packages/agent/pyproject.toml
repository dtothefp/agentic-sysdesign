[project]
name = "sysdesign-agent"
version = "0.1.0"
description = "Module 7: a ReAct chat agent over the sysdesign REST API. A synchronous tool loop (Anthropic Python SDK) whose tools are thin HTTP clients of services/api, exposed two ways off one generator: a stdout CLI (curl-free local testing) and a FastAPI /chat SSE endpoint the future chat-web UI consumes. The agent is a CLIENT of the data API, never part of it."
requires-python = ">=3.13"
dependencies = [
  "sysdesign-core",     # only for common.env (the workspace-root .env loader)
  "anthropic>=0.40",    # the model client; the loop uses messages.stream for token streaming
  "httpx>=0.27",        # the tools are HTTP clients of services/api
  "fastapi>=0.115",     # the /chat SSE transport (server.py)
  "uvicorn[standard]>=0.30",
  "sse-starlette>=2.1", # EventSourceResponse, same SSE primitive services/api already uses
]

[tool.uv.sources]
sysdesign-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent"]
