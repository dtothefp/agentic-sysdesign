# Deploy the Module 5 digest agent to the Managed Agents control plane, the
# standard CI/CD flow: a named agent + named deployment per environment, driven
# by packages/agents/agentctl.py (a thin `ant` CLI wrapper, see that file).
#
#   Manual dispatch  -> one input, the tier. Everything else is inferred:
#                       - local: branch = the ref you dispatched from; base URL =
#                         the cloudflared tunnel; deploys AND runs (you dispatch a
#                         local deploy to watch the agent hit your laptop).
#                       - prod:  base URL = sysdesign.thedefrag.ai; deploys only,
#                         no run (prod is manual; trigger with `TIER=prod moon run agents:run`).
#   Merge to main    -> upsert the prod agent + deployment so main always has a
#                       current prod deployment. Does NOT run (a real prod system
#                       would schedule it, see deployment.yaml).
#
# Preview isn't a manual option: its base URL is a per-PR *.up.railway.app that
# only preview-env.yml knows (it deploys/tears down the preview agent on the
# `preview` label). agentctl still supports --tier preview; this dropdown just
# doesn't, because there's nothing to infer it from here.
#
# Requires two repo secrets: ANTHROPIC_API_KEY (for `ant`) and SYSDESIGN_API_KEY
# (injected into the vault credentials). Fork PRs don't receive secrets.

name: agent-deploy

on:
  workflow_dispatch:
    inputs:
      tier:
        description: Which environment to deploy (local uses this branch + the tunnel; prod uses sysdesign.thedefrag.ai)
        type: choice
        options: [local, prod]
        required: true
  push:
    branches: [main]

concurrency:
  group: agent-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ant

      - name: Deploy (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSDESIGN_API_KEY: ${{ secrets.SYSDESIGN_API_KEY }}
          TIER: ${{ inputs.tier }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          # Only the tier is passed. agentctl infers the base URL from the tier
          # (TIER_BASE_URLS) for local and prod; the branch (local only) is the ref
          # this workflow was dispatched from.
          if [ "$TIER" = "local" ]; then
            python packages/agents/agentctl.py deploy --tier local --branch "$REF_NAME" --sha "$SHA" --run
          else
            python packages/agents/agentctl.py deploy --tier prod --sha "$SHA"
          fi

      - name: Deploy prod (merge to main)
        if: github.event_name == 'push'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYSDESIGN_API_KEY: ${{ secrets.SYSDESIGN_API_KEY }}
        run: python packages/agents/agentctl.py deploy --tier prod --sha "${{ github.sha }}"
