# Local dev container: a Python workspace plus its own Postgres.
#
# This is standalone on purpose. It does NOT include ../docker-compose.yml, because
# Compose *appends* port mappings across included files rather than replacing them,
# so including the root compose would drag its `5432:5432` host publish in here and
# collide with a host-run `make up`. The dev container reaches Postgres over the
# internal compose network at db:5432, so it never needs to publish 5432 on the host.
# Result: you can run the host stack and the dev container at the same time.
#
# This db is a separate volume from the host one, so it starts empty. Seed it once
# from a dev-container terminal with `make db-init` (the db is already running as a
# sibling here, so use db-init, not the host-only `make setup`).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: sysdesign
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d sysdesign"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Module 2 broker + result backend for Celery, and the pub/sub bus the SSE progress
  # stream reads from. redis:7-alpine matches the ExtractIQ dev container. No persistence
  # (no --appendonly): a job's durable state lives in the `runs` table in Postgres, Redis
  # only carries live progress deltas, so losing it on restart costs nothing.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Module 4's local rating model. Ollama serves an OpenAI-compatible /v1/chat/completions,
  # which is the whole point: the rating adapter talks the same wire shape here as it does
  # to DeepSeek or Groq in prod (own the interface, rent the model). CPU inference in a VM
  # is slow (a handful of tokens/sec), fine for rating one caption at a time. The model
  # itself isn't baked into the image; pull it once with `make ollama-pull` (persists in
  # the ollama volume across rebuilds).
  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama

  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    # Load backend/.env into the container's environment (same pattern as the beeks
    # devcontainer, but pointed at the one secrets file this repo already has instead
    # of a second copy under .devcontainer/). Python processes never needed this
    # (common/env.py fills os.environ from backend/.env on import), but the SHELL did:
    # this is what makes `curl -H "X-API-Key: $SYSDESIGN_API_KEY" ...` work in a
    # container terminal. Values bake in at container create, so after editing
    # backend/.env, rebuild/restart the dev container to see changes in the shell.
    # The explicit `environment:` block below always wins over env_file, so the
    # compose-owned URLs (db, redis, ollama) can't be clobbered from .env.
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://lab:lab@db:5432/sysdesign
      # keep uv's venv OUTSIDE the bind mount. the host's /workspace/.venv is a macOS
      # venv and would shadow a Linux one if uv used the default ./.venv location.
      UV_PROJECT_ENVIRONMENT: /home/vscode/.venv
      # Celery + the SSE stream. One Redis: /0 is the broker (task queue), /1 the result
      # backend (task returns). Progress pub/sub uses bare REDIS_URL because PUBLISH/SUBSCRIBE
      # in Redis are server-wide, not scoped to a logical db, so the worker publishes and the
      # SSE endpoint subscribes on the same instance regardless of db number.
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Module 4: point the rating adapter's ollama provider at the sibling service, and
      # default every run to the local model. Prod gets its default (a hosted Groq model)
      # from the Railway env manifest instead.
      # The local model must be small and NON-THINKING. qwen3:4b emits ~700 <think> tokens
      # per rating, which container CPU can't finish inside the adapter's 180s timeout, so
      # every call got cancelled at the deadline and retried: infinite compute burn, zero
      # ratings, and the retry loop clogged the queue for every later run (2026-07-08).
      OLLAMA_BASE_URL: http://ollama:11434/v1
      RATING_MODEL: ollama/llama3.2:1b
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  ollama:
