# Local dev container: a Python workspace plus its own Postgres.
#
# This is standalone on purpose. It does NOT include ../docker-compose.yml, because
# Compose *appends* port mappings across included files rather than replacing them,
# so including the root compose would drag its `5432:5432` host publish in here and
# collide with a host-run `make up`. The dev container reaches Postgres over the
# internal compose network at db:5432, so it never needs to publish 5432 on the host.
# Result: you can run the host stack and the dev container at the same time.
#
# This db is a separate volume from the host one, so it starts empty. Seed it once
# from a dev-container terminal with `make db-init` (the db is already running as a
# sibling here, so use db-init, not the host-only `make setup`).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: sysdesign
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d sysdesign"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Module 2 broker + result backend for Celery, and the pub/sub bus the SSE progress
  # stream reads from. redis:7-alpine matches the ExtractIQ dev container. No persistence
  # (no --appendonly): a job's durable state lives in the `runs` table in Postgres, Redis
  # only carries live progress deltas, so losing it on restart costs nothing.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://lab:lab@db:5432/sysdesign
      # keep uv's venv OUTSIDE the bind mount. the host's /workspace/.venv is a macOS
      # venv and would shadow a Linux one if uv used the default ./.venv location.
      UV_PROJECT_ENVIRONMENT: /home/vscode/.venv
      # Celery + the SSE stream. One Redis: /0 is the broker (task queue), /1 the result
      # backend (task returns). Progress pub/sub uses bare REDIS_URL because PUBLISH/SUBSCRIBE
      # in Redis are server-wide, not scoped to a logical db, so the worker publishes and the
      # SSE endpoint subscribes on the same instance regardless of db number.
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
