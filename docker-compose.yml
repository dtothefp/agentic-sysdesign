# Just Postgres with pgvector baked in, so CREATE EXTENSION vector just works.
# Module 1 needs no Redis (that arrives with Celery in the Module 2 repo).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: sysdesign
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d sysdesign"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
